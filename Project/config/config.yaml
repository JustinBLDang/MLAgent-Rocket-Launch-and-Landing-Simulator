behaviors:
  RocketAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      shared_critic: false
      learning_rate_schedule: linear
      beta_schedule: linear
      epsilon_schedule: linear
    checkpoint_interval: 50000
    network_settings:
      normalize: false
      hidden_units: 512
      num_layers: 2
      vis_encode_type: simple
      memory: null
      goal_conditioning_type: hyper
      deterministic: false
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
        network_settings:
          normalize: false
          hidden_units: 128
          num_layers: 2
          vis_encode_type: simple
          memory: null
          goal_conditioning_type: hyper
          deterministic: false
      gail:
        strength: 0.5
        demo_path: "demos/LaunchDemo.demo"
      curiosity:
        strength: 0.02
        gamma: 0.99
        network_settings:
          hidden_units: 256
    behavioral_cloning:
      strength: 0.5
      demo_path: "demos/LaunchDemo.demo"
    init_path: null
    keep_checkpoints: 5
    even_checkpoints: false
    max_steps: 2000000
    time_horizon: 64
    summary_freq: 10000
    threaded: false
    self_play: null